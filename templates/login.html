{% extends "base.html" %}

{% block title %}Sign in &middot; PDU Control{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div class="auth-logo">PDU</div>
      <h1>Sign in</h1>
      <p class="auth-sub">Power Distribution Unit control panel</p>
    </div>
    <form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
      <label class="field">
        <span class="field-label">Username</span>
        <input type="text" name="username" value="{{ username or '' }}"
               autocomplete="username" autofocus required />
      </label>
      <label class="field">
        <span class="field-label">Password</span>
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <label class="checkbox">
        <input type="checkbox" name="remember" value="1" />
        <span>Remember me</span>
      </label>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
